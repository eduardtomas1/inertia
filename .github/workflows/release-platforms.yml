name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 50
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-15
            platform: macos-arm64
            dist_script: dist:mac
          - label: Windows x64
            runner: windows-2025
            platform: windows-x64
            dist_script: dist:win
          - label: Linux x64
            runner: ubuntu-24.04
            platform: linux-x64
            dist_script: dist:linux
    env:
      CI: "true"

    steps:
      - name: Check out exact release tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate exact tag and commit
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_REF: ${{ github.ref }}
          RELEASE_EVENT_SHA: ${{ github.sha }}
        run: node scripts/validate-release.mjs

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Typecheck, unit test, and build
        run: npm run check

      - name: Run portable runtime and provider protocol suite
        run: npm run test:portable

      - name: Audit dependencies
        if: runner.os == 'Linux'
        run: npm audit --audit-level=high

      - name: Run Electron end-to-end tests
        if: runner.os != 'Linux'
        run: npm exec -- playwright test

      - name: Run Electron end-to-end tests under Xvfb
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm exec -- playwright test

      - name: Build release package
        env:
          DIST_SCRIPT: ${{ matrix.dist_script }}
        run: npm run "$DIST_SCRIPT"

      - name: Smoke native packaged app
        if: runner.os != 'Linux'
        run: npm run test:package-smoke

      - name: Smoke native packaged app under Xvfb
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run test:package-smoke

      - name: Verify complete macOS bundle signature and fuses
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          mac_app="release/mac-arm64/Inertia.app"
          codesign --verify --deep --strict --verbose=2 "$mac_app"
          fuse_report="$(npx --no-install electron-fuses read --app "$mac_app")"
          printf '%s\n' "$fuse_report"
          grep -Fq 'RunAsNode is Disabled' <<<"$fuse_report"
          grep -Fq 'EnableCookieEncryption is Enabled' <<<"$fuse_report"
          grep -Fq 'EnableNodeOptionsEnvironmentVariable is Disabled' <<<"$fuse_report"
          grep -Fq 'EnableNodeCliInspectArguments is Disabled' <<<"$fuse_report"
          grep -Fq 'EnableEmbeddedAsarIntegrityValidation is Enabled' <<<"$fuse_report"
          grep -Fq 'OnlyLoadAppFromAsar is Enabled' <<<"$fuse_report"
          grep -Fq 'GrantFileProtocolExtraPrivileges is Disabled' <<<"$fuse_report"

      - name: Stage exact release assets and checksums
        env:
          INERTIA_RELEASE_STAGE_DIR: ${{ runner.temp }}/inertia-release-stage
          RELEASE_PLATFORM: ${{ matrix.platform }}
        run: node scripts/release-assets.mjs stage "$RELEASE_PLATFORM"

      - name: Keep release build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.platform }}
          path: ${{ runner.temp }}/inertia-release-stage/${{ matrix.platform }}
          if-no-files-found: error
          retention-days: 14

      - name: Keep failure diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-test-results-${{ matrix.platform }}
          path: test-results
          if-no-files-found: ignore
          retention-days: 7

  upload:
    name: Publish exact-tag release
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
      attestations: write
      id-token: write
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out exact release tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Revalidate exact tag and commit
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_REF: ${{ github.ref }}
          RELEASE_EVENT_SHA: ${{ github.sha }}
        run: node scripts/validate-release.mjs

      - name: Download macOS release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-macos-arm64
          path: ${{ runner.temp }}/inertia-release-assets/macos-arm64

      - name: Download Windows release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-windows-x64
          path: ${{ runner.temp }}/inertia-release-assets/windows-x64

      - name: Download Linux release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-linux-x64
          path: ${{ runner.temp }}/inertia-release-assets/linux-x64

      - name: Verify and consolidate release assets
        env:
          INERTIA_RELEASE_DOWNLOAD_DIR: ${{ runner.temp }}/inertia-release-assets
        run: node scripts/release-assets.mjs finalize

      - name: Attest release build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ runner.temp }}/inertia-release-assets/final/*

      - name: Upload without replacing existing assets
        env:
          ASSET_DIRECTORY: ${{ runner.temp }}/inertia-release-assets/final
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mapfile -d '' -t assets < <(find "$ASSET_DIRECTORY" -maxdepth 1 -type f -print0 | sort -z)
          if [[ "${#assets[@]}" -ne 5 ]]; then
            echo "Expected four installers/archives and SHA256SUMS.txt; found ${#assets[@]}." >&2
            exit 1
          fi

          created_release=false
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --draft \
              --title "Inertia $RELEASE_TAG" \
              --generate-notes
            created_release=true
          fi

          gh release upload "$RELEASE_TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY"
          if [[ "$created_release" == true ]]; then
            gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest
          fi
