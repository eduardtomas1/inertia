name: Build release platforms

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to receive the builds
        required: true
        default: v0.0.1

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            script: dist:win
            files: release/*.exe
            artifact: inertia-windows-x64
          - name: Linux x64
            os: ubuntu-latest
            script: dist:linux
            files: release/*.AppImage
            artifact: inertia-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Build installer
        run: npm run ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Keep workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

      - name: Add installer to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_FILES: ${{ matrix.files }}
        run: gh release upload "$RELEASE_TAG" $RELEASE_FILES --clobber
